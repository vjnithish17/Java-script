<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form action="" onsubmit="phone(event)">
        <input type="text" placeholder="Enter ph number" id="number"><br>
        <button type="submit">Submit</button>
    </form>

    <script>
        let ph = []
        let phone = (event) => {
            event.preventDefault()

            let phone=event.target[0].value
            ph.push(phone)
            console.log(ph);
            

        }
    </script>


</body>

</html>
