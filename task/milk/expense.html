<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Entry</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

     <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <div class="container-fluid">
        <div class="row">

            <!-- Sidebar -->

            <div class="col-md-2 sidebar p-3">

                <h3 class="text-center text-white mb-4">
                    🐄 Dairy Farm
                </h3>

                  <ul class="nav flex-column">
                    <li class="nav-item"><a href="./dashboard.html" class="nav-link active">Dashboard</a></li>
                    <li class="nav-item"><a href="./addcow.html" class="nav-link">Add Cow</a></li>
                    <li class="nav-item"><a href="./milkentery.html" class="nav-link">Milk Entry</a></li>
                    <li class="nav-item"><a href="./expense.html" class="nav-link">Expense</a></li>
                    <li class="nav-item"><a href="./reports.html" class="nav-link">Reports</a></li>
                </ul>

            </div>

            <!-- Main -->

            <div class="col-md-10 p-4">

                <h2>Daily Expense Entry</h2>

                <div class="cow-form p-4 mt-4">

                    <div class="row g-3">

                        <div class="col-md-4">
                            <select id="expenseType" class="form-control">

                                <option value="">
                                    Select Expense
                                </option>

                                <option>
                                    Food
                                </option>

                                <option>
                                    Medicine
                                </option>

                                <option>
                                    Labour
                                </option>

                                <option>
                                    Electricity
                                </option>

                                <option>
                                    Other
                                </option>

                            </select>
                        </div>

                        <div class="col-md-4">
                            <input type="number" id="expenseAmount" class="form-control" placeholder="Enter Amount">
                        </div>

                        <div class="col-md-4">
                            <button class="btn btn-success w-100" onclick="addExpense()">
                                Add Expense
                            </button>
                        </div>

                    </div>

                </div>

                <!-- Table -->

                <table class="table table-striped mt-4">

                    <thead class="table-dark">

                        <tr>
                            <th>Expense Type</th>
                            <th>Amount</th>
                        </tr>

                    </thead>

                    <tbody id="expenseTable">

                    </tbody>

                </table>

                <!-- Total -->

                <div class="card-box bg-danger mt-4">

                    <h4>Total Expense</h4>

                    <h2 id="totalExpense">
                        ₹0
                    </h2>

                </div>

            </div>
        </div>
    </div>

    <script src="milk.js"></script>

</body>

</html>
