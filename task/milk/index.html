<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dairy Farm Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container-fluid">
        <div class="row">

            <!-- Sidebar -->
            <div class="col-md-2 sidebar p-3">
                <h3 class="text-center text-white mb-4">🐄 Dairy Farm</h3>

                <ul class="nav flex-column">
                    <li class="nav-item"><a href="#" class="nav-link active">Dashboard</a></li>
                    <li class="nav-item"><a href="#" class="nav-link">Add Cow</a></li>
                    <li class="nav-item"><a href="#" class="nav-link">Milk Entry</a></li>
                    <li class="nav-item"><a href="#" class="nav-link">Expense</a></li>
                    <li class="nav-item"><a href="#" class="nav-link">Reports</a></li>
                </ul>
            </div>

            <!-- Main -->
            <div class="col-md-10 p-4">

                <h2 class="mb-4">Dashboard</h2>

                <div class="row g-4">

                    <div class="col-md-4">
                        <div class="card-box bg-primary">
                            <h5>Morning Milk</h5>
                            <h2 id="morningMilk">45 L</h2>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card-box bg-success">
                            <h5>Evening Milk</h5>
                            <h2 id="eveningMilk">40 L</h2>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card-box bg-warning">
                            <h5>Total Milk</h5>
                            <h2 id="totalMilk">85 L</h2>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card-box bg-info">
                            <h5>Income</h5>
                            <h2 id="income">₹4250</h2>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card-box bg-danger">
                            <h5>Expense</h5>
                            <h2 id="expense">₹2500</h2>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card-box bg-dark">
                            <h5>Profit</h5>
                            <h2 id="profit">₹1750</h2>
                        </div>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <script src="script.js">
        let morningMilk = 45;
        let eveningMilk = 40;
        let milkRate = 50;
        let expense = 2500;

        let totalMilk = morningMilk + eveningMilk;
        let income = totalMilk * milkRate;
        let profit = income - expense;

        document.getElementById("morningMilk").innerText = morningMilk + " L";
        document.getElementById("eveningMilk").innerText = eveningMilk + " L";
        document.getElementById("totalMilk").innerText = totalMilk + " L";

        document.getElementById("income").innerText = "₹" + income;
        document.getElementById("expense").innerText = "₹" + expense;
        document.getElementById("profit").innerText = "₹" + profit;
    </script>
</body>

</html>
