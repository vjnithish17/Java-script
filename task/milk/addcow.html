<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Cow</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <div class="container-fluid">
        <div class="row">

            <div class="col-md-2 sidebar p-3">
                <h3 class="text-center text-white mb-4">🐄 Dairy Farm</h3>
                <ul class="nav flex-column">
                    <li class="nav-item"><a href="./dashboard.html" class="nav-link active">Dashboard</a></li>
                    <li class="nav-item"><a href="./addcow.html" class="nav-link">Add Cow</a></li>
                    <li class="nav-item"><a href="./milkentery.html" class="nav-link">Milk Entry</a></li>
                    <li class="nav-item"><a href="./expense.html" class="nav-link">Expense</a></li>
                    <li class="nav-item"><a href="./reports.html" class="nav-link">Reports</a></li>
                </ul>
            </div>

            <div class="col-md-10 p-4">

                <h2>Add New Cow</h2>

                <div class="cow-form p-4 mt-4">

                    <div class="row g-3">

                        <div class="col-md-4">
                            <input type="text" id="cowId" class="form-control" placeholder="Cow ID">
                        </div>

                        <div class="col-md-4">
                            <input type="text" id="cowName" class="form-control" placeholder="Cow Name">
                        </div>

                        <div class="col-md-4">
                            <input type="text" id="breed" class="form-control" placeholder="Breed">
                        </div>

                        <div class="col-md-4">
                            <input type="number" id="age" class="form-control" placeholder="Age">
                        </div>

                        <div class="col-md-4">
                            <input type="number" id="milkCapacity" class="form-control" placeholder="Milk Capacity">
                        </div>

                        <div class="col-md-4">
                            <button class="btn btn-success w-100" onclick="addCow()">Add Cow</button>
                        </div>

                    </div>

                </div>

                <table class="table table-striped mt-4">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Breed</th>
                            <th>Age</th>
                            <th>Milk Capacity</th>
                        </tr>
                    </thead>

                    <tbody id="cowTable"></tbody>
                </table>

            </div>

        </div>
    </div>

    <script src="milk.js"></script>

</body>

</html>
